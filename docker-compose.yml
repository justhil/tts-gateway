services:
  tts-gateway:
    build: .
    image: tts-gateway:local
    container_name: tts-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-8088}:8080"
    environment:
      GENIE_HOST: ${GENIE_HOST:-http://host.docker.internal:8429}
      CHARACTERS_ROOT: /data/characters
      REFS_ROOT: /data/refs
      DATA_DIR: /data/config
      API_KEY: ${API_KEY:-}
      REFS_SCAN_MAX_DEPTH: ${REFS_SCAN_MAX_DEPTH:-2}
      GENIE_PATH_PREFIX: ${GENIE_PATH_PREFIX:-}
      GENIE_PATH_REPLACE: ${GENIE_PATH_REPLACE:-}
    volumes:
      - ${GENIE_CHARACTERS_DIR:-./volumes/characters}:/data/characters:ro
      - ${GENIE_REFS_DIR:-./volumes/refs}:/data/refs:ro
      - ${GENIE_CONFIG_DIR:-./data}:/data/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
# Optional: join existing Docker network for Cloudflare tunnel (see deploy/CLOUDFLARE-TUNNEL.md)
    # networks:
    #   - docker_default
# networks:
#   docker_default:
#     external: true