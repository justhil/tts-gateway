<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Genie TTS 测试</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --text:#e7ecf3; --muted:#8b9cb3; --accent:#3d8bfd; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; max-width: 720px; }
    h1 { font-size: 1.25rem; font-weight: 600; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin: 0.75rem 0 0.25rem; }
    select, textarea, input { width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid #2a3548; background: #121a24; color: var(--text); }
    textarea { min-height: 88px; resize: vertical; }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
    button { padding: 0.55rem 1.1rem; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 500; }
    button:disabled { opacity: 0.5; cursor: wait; }
    button.secondary { background: #2a3548; }
    #status { font-size: 0.85rem; color: var(--muted); margin-top: 0.75rem; min-height: 1.2em; }
    audio { width: 100%; margin-top: 1rem; }
    .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; word-break: break-all; }
  </style>
</head>
<body>
  <h1>Genie TTS Gateway · 试听 / 下载</h1>
  <label>角色</label>
  <select id="char"></select>
  <label>参考音（情绪）</label>
  <select id="ref"></select>
  <p class="meta" id="refMeta"></p>
  <label>台词</label>
  <textarea id="text" placeholder="输入要合成的文本…">你好，这是测试一句。</textarea>
  <div class="row">
    <button id="go">合成 WAV</button>
    <button class="secondary" id="dl" disabled>下载</button>
    <button class="secondary" id="refresh" type="button">刷新目录索引</button>
  </div>
  <div id="status"></div>
  <audio id="player" controls></audio>
  <script>
    const $ = (id) => document.getElementById(id);
    let lastBlob = null;
    const api = (path) => fetch(path).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });

    async function loadChars() {
      const data = await api('/v1/characters');
      const sel = $('char');
      sel.innerHTML = '';
      (data.characters || []).forEach(c => {
        const o = document.createElement('option');
        o.value = c.id;
        o.textContent = c.id + ' → ' + c.genie_character;
        sel.appendChild(o);
      });
      if (sel.options.length) await loadRefs();
    }

    async function loadRefs() {
      const id = $('char').value;
      const data = await api('/v1/characters/' + encodeURIComponent(id) + '/references');
      const sel = $('ref');
      sel.innerHTML = '';
      (data.references || []).forEach(r => {
        const o = document.createElement('option');
        o.value = r.id;
        o.dataset.path = r.path;
        o.dataset.prompt = r.prompt_text;
        o.dataset.emotion = r.emotion;
        o.textContent = r.emotion + ' · ' + r.id;
        sel.appendChild(o);
      });
      updateMeta();
    }

    function updateMeta() {
      const o = $('ref').selectedOptions[0];
      if (!o) { $('refMeta').textContent = ''; return; }
      $('refMeta').textContent = 'prompt: ' + (o.dataset.prompt || '') + '\n' + (o.dataset.path || '');
    }

    $('char').onchange = loadRefs;
    $('ref').onchange = updateMeta;

    $('go').onclick = async () => {
      const btn = $('go');
      btn.disabled = true;
      $('status').textContent = '合成中…';
      $('dl').disabled = true;
      lastBlob = null;
      $('player').removeAttribute('src');
      try {
        const body = {
          text: $('text').value.trim(),
          character_id: $('char').value,
          ref_id: $('ref').value,
          language: 'zh',
        };
        const t0 = performance.now();
        const res = await fetch('/v1/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) {
          const err = await res.text();
          throw new Error(res.status + ' ' + err.slice(0, 200));
        }
        lastBlob = await res.blob();
        const url = URL.createObjectURL(lastBlob);
        $('player').src = url;
        $('dl').disabled = false;
        $('status').textContent = '完成 ' + ((performance.now() - t0) / 1000).toFixed(1) + 's · ' + (lastBlob.size / 1024).toFixed(0) + ' KB';
      } catch (e) {
        $('status').textContent = '失败: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    };

    $('dl').onclick = () => {
      if (!lastBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(lastBlob);
      a.download = 'tts_' + $('char').value + '.wav';
      a.click();
    };

    $('refresh').onclick = async () => {
      $('status').textContent = '正在扫描目录…';
      try {
        await fetch('/v1/index/refresh', { method: 'POST' });
        await loadChars();
        $('status').textContent = '索引已更新';
      } catch (e) { $('status').textContent = '刷新失败: ' + e.message; }
    };

    loadChars().catch(e => $('status').textContent = '加载角色失败: ' + e.message);
  </script>
</body>
</html>
